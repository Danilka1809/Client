name: Build EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        
    - name: Install dependencies
      run: npm install
      
    - name: Build EXE
      run: npm run build:windows
      
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: GrifLauncher
        path: dist/*.exe
